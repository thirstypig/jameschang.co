name: Sync public feeds to /now (GitHub, MLB, Letterboxd, FBST)

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: now-html-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch public feeds and update /now/
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 bin/update-public-feeds.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add now/index.html .feeds-heartbeat.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update public feeds on /now page"
            git pull --rebase origin main
            git push
          fi
