name: Sync public feeds to /now (GitHub, MLB, Letterboxd, FBST)

on:
  schedule:
    - cron: '15 */6 * * *'  # every 6h at :15 UTC (00:15/06:15/12:15/18:15) = 5:15 PM/11:15 PM/5:15 AM/11:15 AM PT (PDT; −1h PST in winter)
  workflow_dispatch:

concurrency:
  group: now-html-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Sync to latest main (avoid stale checkout when queued behind another run)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Fetch public feeds and update /now/
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 bin/update-public-feeds.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add now/index.html .feeds-heartbeat.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update public feeds on /now page"
            git pull --rebase origin main
            git push
          fi
