name: Sync WHOOP data to /now

on:
  schedule:
    # Run daily at 10:00 UTC (3am PT / 6am ET)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-whoop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch WHOOP data and update /now/
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: python bin/update-whoop.py

      - name: Update refresh token secret if rotated
        continue-on-error: true
        if: hashFiles('.whoop-refresh-token') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TOKEN=$(cat .whoop-refresh-token)
          gh secret set WHOOP_REFRESH_TOKEN --body "$NEW_TOKEN" || echo "::warning::Could not auto-update refresh token. If sync fails tomorrow, re-run bin/whoop-auth.sh locally."
          rm -f .whoop-refresh-token

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add now/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update WHOOP data on /now page"
            git push
          fi
