name: Sync /work/ replica pages

on:
  schedule:
    # Every Monday at 15:00 UTC (~8am PST / 11am EST)
    - cron: "0 15 * * 1"
  workflow_dispatch: {}  # allow manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        run: python3 bin/sync-work.py

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "jameschang-co[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(sync): auto-update /work/ pages from source"
            git push
            echo "Committed sync update."
          else
            echo "No changes."
          fi
