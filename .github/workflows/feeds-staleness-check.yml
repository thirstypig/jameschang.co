name: Check feed staleness

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6h at :00 UTC (00/06/12/18) = 5 PM/11 PM/5 AM/11 AM PT (PDT; −1h PST in winter)
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check heartbeats & manage issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 bin/check-feed-health.py
