name: Check feed staleness

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check heartbeats & manage issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 bin/check-feed-health.py
