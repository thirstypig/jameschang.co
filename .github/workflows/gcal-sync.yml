name: Sync Google Calendar feed to /now

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: now-html-writer
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to latest main (avoid stale checkout when queued behind another run)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Google Calendar feed
        env:
          GCAL_ICAL_URL: ${{ secrets.GCAL_ICAL_URL }}
        run: python3 bin/update-gcal.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add now/index.html .feeds-heartbeat.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Google Calendar feed on /now page"
            git pull --rebase origin main
            git push
          fi
