<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <title>docs — james chang</title>
  <meta name="description" content="Private docs board.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com; form-action 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests">

  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/notebook.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B3HW5VBDB3"></script>
  <script src="/assets/js/gtag-init.js" defer></script>
</head>
<body>
  <!-- Hidden until docs-viewer.js confirms the sessionStorage unlock flag. -->
  <main class="nb-main nb-admin nb-docs" id="docs-root" hidden>
    <div class="nb-docs-head">
      <div>
        <p class="eyebrow">// private area · portfolio docs hub</p>
        <h1 class="nb-admin-title">docs</h1>
      </div>
      <p class="nb-docs-head-links">
        <a href="/admin/">← board</a> ·
        <button type="button" class="nb-admin-signout">sign out</button>
      </p>
    </div>

    <input type="search" id="docs-search" class="nb-docs-search"
           placeholder="search title / id / path…" aria-label="Search docs" autocomplete="off">

    <div class="nb-docs-layout">
      <nav class="nb-docs-sidebar" id="docs-sidebar" aria-label="Docs"></nav>
      <article class="nb-docs-content" id="docs-content">
        <p class="nb-docs-empty">Select a doc from the left.</p>
      </article>
    </div>
  </main>

  <script src="/admin/docs-viewer.js" defer></script>
  <script src="/script.js" defer></script>
</body>
</html>
