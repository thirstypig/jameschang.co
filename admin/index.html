<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <title>admin — james chang</title>
  <meta name="description" content="Private admin area.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com; form-action 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests">

  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">

<body>
  <!-- Hidden until admin.js confirms the sessionStorage unlock flag. A visitor
       without the flag is bounced to / before this ever renders. -->
  <main class="nb-main nb-admin" id="admin-root" hidden>
    <p class="eyebrow">// private area · curtain, not a lock</p>
    <h1 class="nb-admin-title">admin</h1>
    <p>you're in. · <a href="/admin/docs/">docs board →</a></p>

    <section class="nb-admin-section">
      <div class="nb-portfolio-head-row">
        <h2>portfolio</h2>
        <span class="nb-portfolio-count">// the operator's view · edit admin/portfolio.json</span>
      </div>
      <p id="portfolio-summary" class="nb-portfolio-summary"></p>
      <div id="portfolio-board" class="nb-portfolio">
        <p class="nb-portfolio-loading">loading…</p>
      </div>
    </section>

    <p><button type="button" class="nb-admin-signout">sign out</button></p>
    <p><a href="/">← back to the site</a></p>
  </main>

  <script src="/admin/admin.js" defer></script>
  <script src="/admin/portfolio.js" defer></script>
  <script src="/script.js" defer></script>
</body>
</html>
