<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline' https://www.googletagmanager.com; img-src https://www.google-analytics.com; connect-src https://*.google-analytics.com https://*.analytics.google.com">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>WHOOP OAuth Callback</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B3HW5VBDB3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-B3HW5VBDB3')</script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 4rem auto; padding: 1rem; color: #0f1a2e; }
    h1 { font-size: 1.25rem; }
    .code-box { background: #f4f4f4; border: 1px solid #ccc; border-radius: 6px; padding: 1rem; font-family: monospace; font-size: 0.95rem; word-break: break-all; user-select: all; margin: 1rem 0; }
    .error { color: #b44a3e; }
    .success { color: #3a7a4a; }
    .note { margin-top: 1.5rem; color: #666; font-size: 0.85rem; }
    button { padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>WHOOP Authorization</h1>
  <div id="result"></div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');
      var errorDescription = params.get('error_description');
      var el = document.getElementById('result');

      function makeEl(tag, className, text) {
        var node = document.createElement(tag);
        if (className) node.className = className;
        if (text != null) node.textContent = text;
        return node;
      }

      if (code) {
        var successP = makeEl('p', 'success');
        successP.appendChild(makeEl('strong', null, 'Authorization code received.'));
        el.appendChild(successP);

        el.appendChild(makeEl('p', null, 'Copy this code and paste it into the terminal script:'));

        var codeBox = makeEl('div', 'code-box', code);
        codeBox.id = 'code';
        el.appendChild(codeBox);

        var button = makeEl('button', null, 'Copy to clipboard');
        button.addEventListener('click', function () {
          navigator.clipboard.writeText(code).then(function () {
            button.textContent = 'Copied!';
          });
        });
        el.appendChild(button);

        el.appendChild(makeEl('p', 'note', 'This page is not indexed and can be removed after setup is complete.'));
      } else if (error) {
        var errP = makeEl('p', 'error');
        errP.appendChild(makeEl('strong', null, 'Authorization failed:'));
        errP.appendChild(document.createTextNode(' ' + error));
        el.appendChild(errP);

        if (errorDescription) {
          el.appendChild(makeEl('p', null, errorDescription));
        }
      } else {
        el.appendChild(makeEl('p', 'error', 'No authorization code found in the URL. Make sure you arrived here via the WHOOP OAuth flow.'));
      }
    })();
  </script>
</body>
</html>
